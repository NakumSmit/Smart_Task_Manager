<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Smart Task Manager</h1>
    </header>

    <main>
        <form>
            <div id="form-container">

                <h2>Add New Task</h2>

                <label for="title">Title:</label>
                <input type="text" id="title" name="title" placeholder="Enter Task Title" required><br>

                <label for="description">Description:</label>
                <input type="text" id="description" name="description" placeholder="Enter Task Description"
                    required><br>

                <div id="priority-container">
                    <label for="priority">Task Priority:</label>
                    <input type="radio" id="priority" name="priority" value="low">Low
                    <input type="radio" id="priority" name="priority" value="medium">Medium
                    <input type="radio" id="priority" name="priority" value="high">High
                </div><br>

                <button type="submit">Add Task</button>

            </div>
        </form>
        <div id="task-list">
            <h2>My Tasks</h2>
            <div id="tasks">
                <div class="task">
                    <p>Task 1</p>
                    <p>Priority: High</p>
                    <p>This is task of making task manager.</p>
                    <button>Delete</button>
                    <button>Edit</button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
