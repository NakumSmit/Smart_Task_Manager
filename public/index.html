<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="head-container">
        <header>
            <h1>Smart Task Manager</h1>
        </header>
    </div>

    <main>
        <div id="form">
            <form id="task-form">
                <div id="form-container">

                    <h2>Add New Task</h2>

                    <label for="taskTitle">Title:</label>
                    <input type="text" id="taskTitle" name="taskTitle" placeholder="Enter Task Title" required><br>

                    <label for="taskDescription">Description:</label>
                    <input type="text" id="taskDescription" name="taskDescription" placeholder="Enter Task Description"
                        required><br>

                    <div id="priority-container">
                        <label for="taskPriority">Task Priority:</label>
                        <input type="radio" id="priorityLow" name="taskPriority" value="low" required>
                        <label for="priorityLow">Low</label>
                        <input type="radio" id="priorityMedium" name="taskPriority" value="medium">
                        <label for="priorityMedium">Medium</label>
                        <input type="radio" id="priorityHigh" name="taskPriority" value="high">
                        <label for="priorityHigh">High</label>
                    </div><br>

                    <button type="submit">Add Task</button>

                </div>
            </form>
        </div>
        <div id="task-list">
            <h2>My Tasks</h2>
            <ul id="tasks">
            </ul>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
