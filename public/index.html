<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div id="head-container">
        <header>
            <h1 class="text-primary">Smart Task Manager</h1>
        </header>
    </div>

    <main>
        <div id="form">
            <form id="task-form" action="#" class="needs-validation p-3 rounded" novalidate>
                <div id="form-container">

                    <h2 class="text-primary">Add New Task</h2>
                    <hr>

                    <label for="taskTitle">Title:</label>
                    <input type="text" id="taskTitle" name="taskTitle" placeholder="Enter Task Title" required>
                    <div class="invalid-feedback">Please enter a task title.</div><br>

                    <label for="taskDescription">Description:</label>
                    <input type="text" id="taskDescription" name="taskDescription"
                        placeholder="Enter Task Description"><br>

                    <div id="priority-container">
                        <label for="taskPriority">Task Priority:</label>
                        <input type="radio" id="priorityLow" name="taskPriority" value="low" required>
                        <label for="priorityLow">Low</label>
                        <input type="radio" id="priorityMedium" name="taskPriority" value="medium">
                        <label for="priorityMedium">Medium</label>
                        <input type="radio" id="priorityHigh" name="taskPriority" value="high">
                        <label for="priorityHigh">High</label>
                        <div class="invalid-feedback">Please select a priority of Task.</div>
                    </div><br>

                    <div id="status-container">
                        <label for="status">Task Status:</label>
                        <input type="radio" id="statusPending" name="status" value="pending" required>
                        <label for="statusPending">Pending</label>
                        <input type="radio" id="statusCompleted" name="status" value="completed">
                        <label for="statusCompleted">Completed</label>
                        <div class="invalid-feedback">Please select a status of Task.</div>
                    </div><br>

                    <div id="button-container">
                        <button class="btn btn-outline-primary" style="width: 15%;" type="submit">Add Task</button>
                        <button class="btn btn-outline-danger" style="width: 15%;" type="reset">Reset</button>
                    </div>

                </div>
            </form>
        </div>
        <div id="task-list">
            <h2 class="text-primary">My Tasks</h2>
            <hr>
            <div class="input-group mb-3">
                <button type="submit" class="btn btn-primary">Search</button>
                <input type="text" class="form-control" placeholder="Search here..." id="search" onkeyup="searchTask()">
            </div>
            <table class="table table-bordered table-striped mt-3">
                <thead class="table-primary border-primary">
                    <tr>
                        <th>Title</th>
                        <th>Id</th>
                        <th>Description</th>
                        <th>Priority</th>
                        <th>CreatedAt</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tasks">
                </tbody>
            </table>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>

</html>
